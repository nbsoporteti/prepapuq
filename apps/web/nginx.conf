server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown route serves index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite emits hashed filenames).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # nginx no mapea .mjs por defecto y lo sirve como application/octet-stream,
    # lo que hace que el navegador rechace importarlo como módulo ESM (worker de
    # pdf.js → "Failed to fetch dynamically imported module"). Forzamos el MIME
    # de JavaScript. types{} vacío + default_type es el modo canónico de forzarlo.
    location ~* \.mjs$ {
        types { }
        default_type text/javascript;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
