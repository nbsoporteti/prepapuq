server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown route serves index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite emits hashed filenames).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
